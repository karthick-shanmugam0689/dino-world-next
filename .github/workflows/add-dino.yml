name: Add a dinosaur

# Triggered by app/api/add-dino via workflow_dispatch.
# Deterministic scripts gate the expensive agent step.
on:
  workflow_dispatch:
    inputs:
      dino_name:
        description: 'Species name to add'
        required: true
        type: string
      request_id:
        description: 'Correlation id set by the trigger route, used only for status polling'
        required: true
        type: string

run-name: "add-dino: ${{ inputs.dino_name }} [${{ inputs.request_id }}]"

permissions:
  contents: write
  pull-requests: write
  id-token: write

# Per-request group so multiple adds can run in parallel (daily API quota still applies).
concurrency:
  group: add-dino-${{ inputs.request_id }}
  cancel-in-progress: false

jobs:
  add-dino:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 🦴 Waking up the dig site
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Sharpening the tools
        run: npm ci

      - name: 🔎 Checking the archives
        id: check
        env:
          DINO_NAME: ${{ inputs.dino_name }}
        run: |
          set +e
          OUT=$(npx tsx scripts/check-dino.ts "$DINO_NAME")
          CODE=$?
          set -e
          echo "status=$(echo "$OUT" | jq -r '.status // "error"')" >> "$GITHUB_OUTPUT"
          echo "json=$(echo "$OUT" | jq -c '.')" >> "$GITHUB_OUTPUT"
          echo "id=$(echo "$OUT" | jq -r '.candidateId // empty')" >> "$GITHUB_OUTPUT"
          echo "input=$(echo "$OUT" | jq -r '.input // empty')" >> "$GITHUB_OUTPUT"
          echo "wiki_title=$(echo "$OUT" | jq -r '.wikipedia.title // empty')" >> "$GITHUB_OUTPUT"
          {
            echo "wiki_description<<EOF"
            echo "$OUT" | jq -r '.wikipedia.description // empty'
            echo "EOF"
            echo "wiki_extract<<EOF"
            echo "$OUT" | jq -r '.wikipedia.extract // empty'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "family_ids=$(echo "$OUT" | jq -c '[.existingFamilies[]?.id] // []')" >> "$GITHUB_OUTPUT"
          if [ "$CODE" -ne 0 ] && [ "$CODE" -ne 2 ] && [ "$CODE" -ne 4 ]; then
            echo "$OUT"
            exit "$CODE"
          fi

      - name: ❌ Already in the collection
        if: steps.check.outputs.status == 'duplicate'
        env:
          CHECK_JSON: ${{ steps.check.outputs.json }}
        run: |
          echo "$CHECK_JSON" | jq -r '.message'

      - name: ❌ No Wikipedia page
        if: steps.check.outputs.status == 'not_found'
        env:
          CHECK_JSON: ${{ steps.check.outputs.json }}
        run: |
          echo "$CHECK_JSON" | jq -r '.message'

      - name: 🖼️ Hunting for portraits
        id: photos
        if: steps.check.outputs.status == 'new'
        env:
          CHECK_JSON: ${{ steps.check.outputs.json }}
        run: |
          TITLE=$(echo "$CHECK_JSON" | jq -r '.wikipedia.title // .input')
          set +e
          OUT=$(npx tsx scripts/find-photos.ts "$TITLE")
          set -e
          echo "json=$(echo "$OUT" | jq -c '.')" >> "$GITHUB_OUTPUT"

      - name: 🧱 Laying the bones
        id: scaffold
        if: steps.check.outputs.status == 'new'
        env:
          CHECK_JSON: ${{ steps.check.outputs.json }}
          PHOTOS_JSON: ${{ steps.photos.outputs.json }}
        run: |
          npx tsx scripts/scaffold-dino.ts

      - name: 🧠 Consulting the fossil record
        id: agent
        if: steps.check.outputs.status == 'new'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          claude_args: |
            --model sonnet
            --max-turns 8
            --allowedTools "Write"
          prompt: |
            Write ONE file only: add-dino-fill.json in the repo root. No other tools.
            Do not read files. Do not edit TypeScript. A script will apply your JSON.

            Species id: ${{ steps.check.outputs.id }}
            Display name hint: ${{ steps.check.outputs.input }}
            Wikipedia title: ${{ steps.check.outputs.wiki_title }}
            Wikipedia description: ${{ steps.check.outputs.wiki_description }}
            Wikipedia extract: ${{ steps.check.outputs.wiki_extract }}
            Existing family ids (reuse one if it fits): ${{ steps.check.outputs.family_ids }}
            Silhouette keys: trex, raptor, ceratops, stego, sauropod, spino, ankylo, hadro, mosasaur, plesiosaur, ptero, therizino
            Model kinds (exactly one): theropod, sauropod, quadruped, marine, pterosaur

            If this is NOT a real Mesozoic dinosaur / pterosaur / marine reptile, write:
            {"legitimate":false,"reason":"<why>"}

            Otherwise write:
            {
              "legitimate": true,
              "id": "<candidateId lowercase letters only>",
              "name": "<display name>",
              "meaning": "<name meaning>",
              "familyId": "<existing id OR newFamily.id>",
              "newFamily": null,
              "periodId": "triassic|jurassic|cretaceous",
              "periodLabel": "e.g. Early Cretaceous · 125–112 Mya",
              "diet": "Carnivore|Herbivore|Piscivore",
              "lengthM": 0,
              "heightM": 0,
              "weightKg": 0,
              "speedKmh": 0,
              "wingSpanM": null,
              "location": "<where>",
              "description": "<2-3 sentences from the extract + knowledge>",
              "facts": ["<fact1>", "<fact2>"],
              "silhouette": "<SilhouetteKey>",
              "color": "#rrggbb",
              "clade": null,
              "model": {
                "kind": "theropod|sauropod|quadruped|marine|pterosaur",
                "bodyLength": 0, "bodyRadius": 0, "neckLength": 0, "neckRadius": 0,
                "headSize": 0, "tailLength": 0, "legHeight": 0, "legRadius": 0,
                "neckAngle": 0.4, "arms": "none|tiny|normal|long",
                "features": {}
              },
              "reason": "<1-2 sentences for the human reviewer>"
            }

            Rules:
            - Prefer an existing familyId. Only set newFamily to an object {id,name,description,period,traits[]} if none fit.
            - clade: null for true dinosaurs; "marine-reptile" or "pterosaur" otherwise.
            - Omit wingSpanM or set null unless pterosaur.
            - Use features only from: plates, spikedBack, horns, frill, frillSpikes, sail, crest, bill, longSnout, sickle, clubTail, armor, steepNeck, tailFluke, crestBlade, giantClaws.
            - Never invent image URLs. Photos are already on the scaffold.
            - Finish in one Write call.

      - name: 🧩 Applying the fill
        id: apply
        if: steps.check.outputs.status == 'new'
        run: |
          npx tsx scripts/apply-dino-fill.ts

      - name: 📋 Reading the verdict
        id: verdict
        if: steps.check.outputs.status == 'new'
        run: |
          if [ -f add-dino-result.json ]; then
            RESULT=$(cat add-dino-result.json)
          else
            RESULT='{"legitimate": false, "reason": "No add-dino-result.json after apply step."}'
          fi
          echo "legitimate=$(echo "$RESULT" | jq -r '.legitimate // false')" >> "$GITHUB_OUTPUT"
          echo "json=$(echo "$RESULT" | jq -c '.')" >> "$GITHUB_OUTPUT"

      - name: ❌ Couldn't verify this one
        if: steps.check.outputs.status == 'new' && steps.verdict.outputs.legitimate != 'true'
        env:
          VERDICT_JSON: ${{ steps.verdict.outputs.json }}
        run: |
          echo "$VERDICT_JSON" | jq -r '.reason'

      - name: 🔧 Running the numbers
        id: build
        if: steps.verdict.outputs.legitimate == 'true'
        run: |
          npx tsx scripts/generate-dino-index.ts
          npx tsc --noEmit -p tsconfig.json
          npm run build

      - name: 📝 Drafting the paperwork
        id: paperwork
        if: steps.build.outcome == 'success'
        env:
          VERDICT_JSON: ${{ steps.verdict.outputs.json }}
        run: |
          echo "id=$(echo "$VERDICT_JSON" | jq -r '.id')" >> "$GITHUB_OUTPUT"
          echo "name=$(echo "$VERDICT_JSON" | jq -r '.name')" >> "$GITHUB_OUTPUT"
          echo "reason=$(echo "$VERDICT_JSON" | jq -r '.reason')" >> "$GITHUB_OUTPUT"

      - name: 📮 Filing the paperwork
        if: steps.build.outcome == 'success'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ github.token }}
          commit-message: "Add ${{ steps.paperwork.outputs.name }} to the field guide"
          committer: add-dino bot <actions@users.noreply.github.com>
          author: add-dino bot <actions@users.noreply.github.com>
          branch: add-dino/${{ steps.paperwork.outputs.id }}
          delete-branch: true
          base: main
          title: Add ${{ steps.paperwork.outputs.name }}
          body: |
            ${{ steps.paperwork.outputs.reason }}

            ---
            request_id: ${{ inputs.request_id }}
            🤖 Generated by the add-dino skill, triggered from the site.
          add-paths: |
            data/dinos/${{ steps.paperwork.outputs.id }}
            data/dinos/index.ts
            data/search-index.ts
            data/families.ts
            components/DinoIcon.tsx
